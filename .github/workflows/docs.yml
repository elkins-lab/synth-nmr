name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material==9.7.1 mkdocstrings[python]==1.0.3 mkdocs-jupyter==0.26.1 nbconvert==7.17.0
          # Install the package itself so mkdocstrings can find the modules
          pip install -e .
          
      - name: Run MkDocs Build (Strict)
        if: github.event_name == 'pull_request'
        run: mkdocs build --strict
        
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        run: mkdocs gh-deploy --force
