name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs-material>=9.5.0" "mkdocstrings>=0.25.0" "mkdocstrings-python>=1.10.0" "pygments>=2.18.0" "mkdocs-jupyter>=0.24.0" "nbconvert>=7.0.0" "griffe>=1.0.0"
          # Install the package itself so mkdocstrings can find the modules
          pip install -e .

      - name: Run MkDocs Build (Strict)
        if: github.event_name == 'pull_request'
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        run: mkdocs gh-deploy --force
