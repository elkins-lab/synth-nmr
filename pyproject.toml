[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "synth-nmr"
version = "0.5.0"
description = "NMR spectroscopy calculations for protein structures"
authors = [{name = "George Elkins"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
dependencies = [
    "numpy>=1.20,<2.0",
    "biotite>=0.35.0",
]
keywords = ["nmr", "spectroscopy", "protein", "structural biology", "computational chemistry"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Chemistry",
]

[project.optional-dependencies]
performance = ["numba>=0.55.0"]
ml = [
    "torch>=2.0.0",
    "scikit-learn>=1.0.0",
]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.10.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/elkins/synth-nmr"
Repository = "https://github.com/elkins/synth-nmr"
Documentation = "https://github.com/elkins/synth-nmr#readme"

[project.scripts]
synth-nmr-cli = "synth_nmr.synth_nmr_cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["synth_nmr*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.black]
line-length = 100
target-version = ['py38']

[tool.ruff]
line-length = 100
target-version = "py38"
